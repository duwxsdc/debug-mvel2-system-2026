<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ETL表达式引擎控制台</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Consolas', 'Monaco', 'Courier New', monospace;
            background-color: #1a1a2e;
            color: #e0e0e0;
            height: 100vh;
            display: flex;
            flex-direction: column;
        }

        .header {
            background-color: #16213e;
            padding: 12px 20px;
            border-bottom: 1px solid #0f3460;
            display: flex;
            justify-content: space-between;
            align-items: center;
        }

        .header h1 {
            font-size: 18px;
            font-weight: 600;
            color: #00d4ff;
        }

        .session-info {
            font-size: 12px;
            color: #6b7280;
        }

        .console-container {
            flex: 1;
            display: flex;
            flex-direction: column;
            overflow: hidden;
        }

        .message-area {
            flex: 1;
            overflow-y: auto;
            padding: 15px;
            background-color: #0f0f1a;
        }

        .message-area::-webkit-scrollbar {
            width: 8px;
        }

        .message-area::-webkit-scrollbar-track {
            background: #1a1a2e;
        }

        .message-area::-webkit-scrollbar-thumb {
            background: #4a5568;
            border-radius: 4px;
        }

        .message {
            margin-bottom: 12px;
            padding: 10px 14px;
            border-radius: 6px;
            background-color: #1a1a2e;
            border-left: 3px solid #00d4ff;
        }

        .message.error {
            border-left-color: #ff4757;
            background-color: #2d1f2f;
        }

        .message.success {
            border-left-color: #2ed573;
            background-color: #1f2d2f;
        }

        .message-header {
            display: flex;
            justify-content: space-between;
            margin-bottom: 6px;
            font-size: 11px;
            color: #6b7280;
        }

        .session-id {
            font-family: monospace;
            color: #00d4ff;
        }

        .timestamp {
            color: #4a5568;
        }

        .expression {
            font-size: 13px;
            color: #ffd700;
            margin-bottom: 8px;
            word-break: break-all;
        }

        .result {
            font-size: 14px;
            color: #2ed573;
            word-break: break-all;
            white-space: pre-wrap;
        }

        .error-message {
            font-size: 14px;
            color: #ff4757;
            word-break: break-all;
        }

        .variables {
            margin-top: 8px;
            padding-top: 8px;
            border-top: 1px solid #374151;
            font-size: 12px;
            color: #a0aec0;
        }

        .variables-title {
            color: #6b7280;
            margin-bottom: 4px;
        }

        .variable-item {
            margin-left: 12px;
            color: #90cdf4;
        }

        .input-area {
            background-color: #16213e;
            padding: 15px;
            border-top: 1px solid #0f3460;
        }

        .input-wrapper {
            display: flex;
            align-items: center;
            background-color: #0f0f1a;
            border-radius: 8px;
            border: 1px solid #374151;
            transition: border-color 0.2s;
        }

        .input-wrapper:focus-within {
            border-color: #00d4ff;
            box-shadow: 0 0 0 3px rgba(0, 212, 255, 0.1);
        }

        .prompt {
            padding: 12px 15px;
            color: #00d4ff;
            font-weight: 600;
            user-select: none;
        }

        .input-field {
            flex: 1;
            background: transparent;
            border: none;
            outline: none;
            color: #e0e0e0;
            font-family: inherit;
            font-size: 14px;
            padding: 12px 0;
            resize: none;
            min-height: 24px;
            max-height: 200px;
            overflow-y: auto;
        }

        .input-field::-webkit-scrollbar {
            width: 6px;
        }

        .input-field::-webkit-scrollbar-track {
            background: transparent;
        }

        .input-field::-webkit-scrollbar-thumb {
            background: #4a5568;
            border-radius: 3px;
        }

        .send-btn {
            padding: 12px 20px;
            background-color: #00d4ff;
            color: #1a1a2e;
            border: none;
            border-radius: 0 8px 8px 0;
            font-weight: 600;
            cursor: pointer;
            transition: background-color 0.2s;
        }

        .send-btn:hover {
            background-color: #00b8e6;
        }

        .send-btn:disabled {
            background-color: #4a5568;
            cursor: not-allowed;
        }

        .status-bar {
            background-color: #0f0f1a;
            padding: 8px 15px;
            font-size: 11px;
            color: #6b7280;
            display: flex;
            justify-content: space-between;
        }

        .connection-status {
            display: flex;
            align-items: center;
            gap: 8px;
        }

        .status-dot {
            width: 8px;
            height: 8px;
            border-radius: 50%;
            background-color: #ff4757;
        }

        .status-dot.connected {
            background-color: #2ed573;
            animation: pulse 2s infinite;
        }

        @keyframes pulse {
            0%, 100% { opacity: 1; }
            50% { opacity: 0.5; }
        }

        .help-text {
            font-size: 11px;
            color: #4a5568;
            margin-bottom: 10px;
        }
    </style>
</head>
<body>
    <div class="header">
        <h1>ETL表达式引擎控制台</h1>
        <div class="session-info" id="sessionInfo">未连接</div>
    </div>

    <div class="console-container">
        <div class="message-area" id="messageArea">
            <div class="help-text">
                支持的语法:
                <ul style="margin-left: 20px; margin-top: 4px;">
                    <li>变量赋值: <code>a=100</code>, <code>name="test"</code>, <code>flag=true</code></li>
                    <li>数学运算: <code>1+2*3</code>, <code>a+b*c</code></li>
                    <li>逻辑判断: <code>a &gt; b</code>, <code>flag &amp;&amp; (x &lt; 10)</code></li>
                    <li>三元运算: <code>a &gt; 10 ? "big" : "small"</code></li>
                    <li>多行执行: 使用分号分隔多个表达式</li>
                    <li>SQL查询: <code>SELECT * FROM TABLE_NAME</code></li>
                </ul>
            </div>
        </div>

        <div class="input-area">
            <div class="input-wrapper">
                <span class="prompt">&gt;</span>
                <textarea 
                    class="input-field" 
                    id="inputField" 
                    placeholder="输入表达式... (按 Ctrl+Enter 换行, Enter 提交)"
                    spellcheck="false"
                ></textarea>
                <button class="send-btn" id="sendBtn" disabled>发送</button>
            </div>
        </div>
    </div>

    <div class="status-bar">
        <div class="connection-status">
            <div class="status-dot" id="statusDot"></div>
            <span id="connectionText">已断开</span>
        </div>
        <span>WebSocket</span>
    </div>

    <script>
        const messageArea = document.getElementById('messageArea');
        const inputField = document.getElementById('inputField');
        const sendBtn = document.getElementById('sendBtn');
        const statusDot = document.getElementById('statusDot');
        const connectionText = document.getElementById('connectionText');
        const sessionInfo = document.getElementById('sessionInfo');

        let ws = null;
        let sessionId = null;

        function connect() {
            const protocol = window.location.protocol === 'https:' ? 'wss:' : 'ws:';
            const url = `${protocol}//${window.location.host}/ws/expression`;
            
            ws = new WebSocket(url);

            ws.onopen = () => {
                statusDot.classList.add('connected');
                connectionText.textContent = '已连接';
                sendBtn.disabled = false;
            };

            ws.onmessage = (event) => {
                const data = JSON.parse(event.data);
                sessionId = data.sessionId;
                sessionInfo.textContent = `会话: ${sessionId.substring(0, 8)}...`;
                displayMessage(data);
            };

            ws.onerror = (error) => {
                console.error('WebSocket error:', error);
            };

            ws.onclose = () => {
                statusDot.classList.remove('connected');
                connectionText.textContent = '已断开';
                sendBtn.disabled = true;
                sessionInfo.textContent = '未连接';
                
                setTimeout(connect, 3000);
            };
        }

        function displayMessage(data) {
            const messageDiv = document.createElement('div');
            messageDiv.className = `message ${data.success ? 'success' : 'error'}`;

            const header = document.createElement('div');
            header.className = 'message-header';
            header.innerHTML = `
                <span class="session-id">${data.sessionId.substring(0, 8)}...</span>
                <span class="timestamp">${formatTime(data.timestamp)}</span>
            `;
            messageDiv.appendChild(header);

            const expression = document.createElement('div');
            expression.className = 'expression';
            expression.textContent = `&gt; ${data.expression}`;
            messageDiv.appendChild(expression);

            if (data.success) {
                const result = document.createElement('div');
                result.className = 'result';
                result.textContent = formatResult(data.result);
                messageDiv.appendChild(result);

                if (data.assignedVariables && Object.keys(data.assignedVariables).length > 0) {
                    const variables = document.createElement('div');
                    variables.className = 'variables';
                    variables.innerHTML = `<div class="variables-title">变量:</div>`;
                    
                    for (const [key, value] of Object.entries(data.assignedVariables)) {
                        const varItem = document.createElement('div');
                        varItem.className = 'variable-item';
                        varItem.textContent = `${key} = ${formatResult(value)}`;
                        variables.appendChild(varItem);
                    }
                    messageDiv.appendChild(variables);
                }
            } else {
                const error = document.createElement('div');
                error.className = 'error-message';
                error.textContent = `错误: ${data.errorMessage}`;
                messageDiv.appendChild(error);
            }

            messageArea.appendChild(messageDiv);
            messageArea.scrollTop = messageArea.scrollHeight;
        }

        function formatResult(result) {
            if (result === null) return 'null';
            if (result === undefined) return 'undefined';
            if (typeof result === 'object') {
                return JSON.stringify(result, null, 2);
            }
            return String(result);
        }

        function formatTime(timestamp) {
            if (!timestamp) return new Date().toLocaleTimeString();
            const date = new Date(timestamp);
            return date.toLocaleTimeString();
        }

        function sendMessage() {
            const expression = inputField.value.trim();
            if (!expression || !ws || ws.readyState !== WebSocket.OPEN) return;

            ws.send(expression);
            inputField.value = '';
        }

        inputField.addEventListener('keydown', (e) => {
            if (e.key === 'Enter' && !e.ctrlKey && !e.shiftKey) {
                e.preventDefault();
                sendMessage();
            }
        });

        inputField.addEventListener('input', () => {
            sendBtn.disabled = !inputField.value.trim();
        });

        sendBtn.addEventListener('click', sendMessage);

        connect();
    </script>
</body>
</html>
